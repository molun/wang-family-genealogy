name: 部署王氏宗谱网站到GitHub Pages
on:
  push:
    branches: [ main ]

# 关键：设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    env:
      # 强制使用 Node 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24'
      
      - name: 安装依赖
        run: npm install
      
      - name: 构建网站
        run: npm run build
      
      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 部署任务（使用官方 GitHub Pages 部署器，最稳定）
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
